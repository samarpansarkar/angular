<div class="max-w-3xl mx-auto mt-10 rounded-lg p-8 bg-slate-100 shadow-lg">
  <h2 class="mb-6 text-3xl font-bold text-center">
    Student Registration Form
  </h2>

  <form #studentForm="ngForm" (ngSubmit)="onSubmit(studentForm)">
    <div class="mb-4">
      <label class="mb-2 block font-medium">Your Name</label>
      <input
        type="text"
        name="name"
        [(ngModel)]="studentObj.name"
        required
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500"
        placeholder="Enter your name">
    </div>

    <div class="mb-4">
      <label class="mb-2 block font-medium">Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="studentObj.email"
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500"
        placeholder="Enter email">
    </div>

    <div class="mb-4">
      <label class="mb-2 block font-medium">Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="studentObj.password"
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500"
        placeholder="Enter password">
    </div>

    <div class="mb-4">
      <label class="mb-2 block font-medium">Phone Number</label>
      <input
        type="tel"
        name="phoneNumber"
        [(ngModel)]="studentObj.phoneNumber"
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500"
        placeholder="Enter phone number">
    </div>

    <div class="mb-4">
      <label class="mb-2 block font-medium">Age</label>
      <input
        type="number"
        name="age"
        [(ngModel)]="studentObj.age"
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500">
    </div>

    <!-- Date of Birth -->
    <div class="mb-4">
      <label class="mb-2 block font-medium">Date of Birth</label>
      <input
        type="date"
        name="DOB"
        [(ngModel)]="studentObj.DOB"
        class="w-full rounded-md border px-4 py-2 outline-none focus:border-blue-500">
    </div>

    <!-- Gender -->
    <div class="mb-4">
      <label class="mb-2 block font-medium">Gender</label>

      <div class="flex gap-6">
        <label>
          <input
            type="radio"
            name="gender"
            value="Male"
            [(ngModel)]="studentObj.gender"
            >
            
          Male
        </label>

        <label>
          <input
            type="radio"
            name="gender"
            value="Female"
            [(ngModel)]="studentObj.gender">
          Female
        </label>

        <label>
          <input
            type="radio"
            name="gender"
            value="Other"
            [(ngModel)]="studentObj.gender">
          Other
        </label>
      </div>
    </div>

    <!-- Submit -->
    <div class="text-center">
      <button
        type="submit"
        [disabled]="studentForm.invalid"
        class="rounded-md bg-blue-600 px-8 py-3 text-white transition hover:bg-blue-700">
        Register
      </button>
    </div>

  </form>
</div>
